<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>NAKU · Tablero de compradores</title>
<style>
  :root{ --ink:#191E19; --paper:#F1F2EC; --line:#D5D8CD; --muted:#6C726A; --accent:#12564A; }
  *{box-sizing:border-box}
  html{height:100%}
  body{margin:0;height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;color:var(--ink);background:var(--paper)}
  .bar{flex:0 0 auto;height:48px;display:flex;align-items:center;gap:14px;padding:0 16px;border-bottom:1px solid var(--line);background:#fff;position:relative;z-index:2}
  .bar .brand{font-weight:800;letter-spacing:-.01em;font-size:14px;white-space:nowrap}
  .bar .brand span{font-family:ui-monospace,Menlo,monospace;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);border:1px solid var(--accent);border-radius:3px;padding:2px 6px;margin-right:8px}
  .sw{display:flex;gap:3px;background:#F1F2EC;border:1px solid var(--line);border-radius:8px;padding:3px}
  .sw button{font:inherit;font-size:13px;font-weight:600;color:var(--muted);background:none;border:0;padding:7px 15px;border-radius:6px;cursor:pointer}
  .sw button[aria-pressed="true"]{background:var(--ink);color:#fff}
  .sw button:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  .note{margin-left:auto;font-size:12px;color:var(--muted);max-width:44ch;line-height:1.3}
  .frame{flex:1 1 auto;width:100%;border:0;min-height:0}
  @media(max-width:720px){ .note{display:none} }
</style>
</head>
<body>
  <div class="bar">
    <div class="brand"><span>Naku</span>Tablero de compradores</div>
    <div class="sw" role="group" aria-label="Elegir versión">
      <button id="b-leo"   aria-pressed="false" onclick="pick('leo')">Versión de Leonardo</button>
      <button id="b-nueva" aria-pressed="true"  onclick="pick('nueva')">Versión nueva</button>
    </div>
    <div class="note">Comparación de <b>diseño</b>. Elegí la que más te guste y dejamos esa activa; después la enchufamos a los datos en vivo.</div>
  </div>
  <iframe id="frame" class="frame" title="Tablero" src="nueva.html"></iframe>
<script>
  var FILES = { leo:'leo.html', nueva:'nueva.html' };
  function pick(v){
    if(!FILES[v]) v = 'nueva';
    document.getElementById('frame').src = FILES[v];
    document.getElementById('b-leo').setAttribute('aria-pressed', v==='leo');
    document.getElementById('b-nueva').setAttribute('aria-pressed', v==='nueva');
    try{ history.replaceState(null,'', '?v='+v); }catch(e){}
    document.title = 'NAKU · ' + (v==='leo'?'Versión de Leonardo':'Versión nueva');
  }
  var v = new URLSearchParams(location.search).get('v');
  pick(FILES[v] ? v : 'nueva');
</script>
</body>
</html>
